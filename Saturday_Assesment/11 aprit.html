<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h3 class="mb-1 fw-bold">Calculator</h3>

    <div class="text-start mb-3">
        <label for="n1" class="form-label text-secondary fw-bold">First Number</label>
        <input type="number" class="form-control" id="n1">
    </div>

    <div class="text-start mb-3">
        <label for="n2" class="form-label text-secondary fw-bold">Second Number</label>
        <input type="number" class="form-control" id="n2">
    </div>

    <div class="btn-grid">
        <button class="btn btn-success py-2 fw-bold" onclick="calculate('add')">Add</button>
        <button class="btn btn-primary py-2 fw-bold" onclick="calculate('subtract')">Subtract</button>
        <button class="btn btn-warning py-2 fw-bold" onclick="calculate('multiply')">Multiply</button>
        <button class="btn btn-danger py-2 fw-bold" onclick="calculate('divide')">Division</button>
    </div>

    <div class="result-box" display="flex" align-items="center" >
        <div class="text-secondary fw-bold mb-2">Calculated Result</div>
        <h4 id="rest" class="mb-0 fw-bold"></h4>
    </div>
</div>

<script>
    function calculate(operation) {
        const n1Str = document.getElementById('n1').value;
        const n2Str = document.getElementById('n2').value;

        if (n1Str === '' || n2Str === '') {
            document.getElementById('rest').innerHTML = "Please enter both numbers";
            return;
        }

        const n1 = parseFloat(n1Str);
        const n2 = parseFloat(n2Str);
        let result = 0;
        let symbol = '';

        switch (operation) {
            case 'add':
                result = n1 + n2;
                symbol = '+';
                break;
            case 'subtract':
                result = n1 - n2;
                symbol = '-';
                break;
            case 'multiply':
                result = n1 * n2;
                symbol = '&times;';
                break;
            case 'divide':
                if (n2 === 0) {
                    document.getElementById('rest').innerHTML = "Error: Cannot divide by zero";
                    return;
                }
                result = n1 / n2;
                symbol = '&divide;';
                break;
        }

        document.getElementById('rest').innerHTML = `${n1} ${symbol} ${n2} = ${result}`;
    }
</script>

</body>
</html>

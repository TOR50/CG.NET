<div>
  <div>
    <label>
      Country
      <select [value]="selectedCountry.name" (change)="onCountryChange($any($event.target).value)">
        <option *ngFor="let country of countries" [value]="country.name">
          {{ country.name }}
        </option>
      </select>
    </label>
  </div>

  <app-childcomponent [country]="selectedCountry"></app-childcomponent>
</div>
